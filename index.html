<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>* breathe *</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #050508;
            cursor: crosshair;
        }
        canvas { display: block; }
        #ui {
            position: absolute; bottom: 30px; left: 50%;
            transform: translateX(-50%); color: rgba(255, 255, 255, 0.3);
            font-family: 'Inter', system-ui, sans-serif;
            font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
            pointer-events: none; transition: opacity 1.5s ease;
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const ui = document.getElementById('ui');

        let particles = [];
        const mouse = { x: -1000, y: -1000, active: false };
        let dpr = window.devicePixelRatio || 1;

        function init() {
            dpr = window.devicePixelRatio || 1;
            canvas.width = window.innerWidth * dpr;
            canvas.height = window.innerHeight * dpr;
            canvas.style.width = window.innerWidth + 'px';
            canvas.style.height = window.innerHeight + 'px';
            ctx.scale(dpr, dpr);

            // Dynamic count based on screen size for consistent density
            const count = Math.floor((window.innerWidth * window.innerHeight) / 6000);
            particles = [];
            for (let i = 0; i < count; i++) {
                particles.push(new Particle());
            }
        }

        window.addEventListener('resize', init);
        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
            mouse.active = true;
            ui.style.opacity = 0;
        });

        window.addEventListener('mousedown', () => {
            particles.forEach(p => p.pulse());
        });

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * window.innerWidth;
                this.y = Math.random() * window.innerHeight;
                this.vx = (Math.random() - 0.5) * 0.4;
                this.vy = (Math.random() - 0.5) * 0.4;
                this.radius = Math.random() * 1.5 + 0.5;
                // Vibrance boost: Deep sky blues and violets
                this.hue = 210 + Math.random() * 50; 
                this.opacity = Math.random() * 0.5 + 0.3;
            }

            pulse() {
                const dx = this.x - mouse.x;
                const dy = this.y - mouse.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 400) {
                    const force = 120 / (dist + 20);
                    this.vx += (dx / dist) * force;
                    this.vy += (dy / dist) * force;
                }
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                if (mouse.active) {
                    const dx = mouse.x - this.x;
                    const dy = mouse.y - this.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist < 250) {
                        const accel = 0.0003;
                        this.vx += dx * accel;
                        this.vy += dy * accel;
                    }
                }

                // Smooth friction
                this.vx *= 0.97;
                this.vy *= 0.97;

                // Screen Wrap
                if (this.x < 0) this.x = window.innerWidth;
                if (this.x > window.innerWidth) this.x = 0;
                if (this.y < 0) this.y = window.innerHeight;
                if (this.y > window.innerHeight) this.y = 0;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 80%, 75%, ${this.opacity})`;
                
                // Additive glow for vibrancy
                ctx.shadowBlur = 4;
                ctx.shadowColor = `hsla(${this.hue}, 80%, 75%, 0.5)`;
                
                ctx.fill();
                ctx.shadowBlur = 0; // Reset for performance
            }
        }

        function animate() {
            // REMOVED TRAILING: Use a clean clearRect for sharp movement
            ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);

            // Subtle blending to make overlapping stars pop
            ctx.globalCompositeOperation = 'lighter';

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            ctx.globalCompositeOperation = 'source-over';
            requestAnimationFrame(animate);
        }

        init();
        animate();
    </script>
</body>
</html>
