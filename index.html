<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radiant Kineticism</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; }
        canvas { display: block; }
        #ui {
            position: absolute; top: 20px; left: 20px;
            color: rgba(255, 255, 255, 0.3); font-family: 'Inter', sans-serif;
            font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="ui">Performance Mode: Active • Spectrum: High</div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { alpha: false }); // Optimization: Disable alpha for the main canvas
        let particles = [];
        let spriteCanvas;
        const mouse = { x: -1000, y: -1000, active: false };
        let hueCircle = 0;

        // 1. CREATE A PRE-RENDERED SPRITE (The "Speed" Secret)
        function createParticleSprite() {
            spriteCanvas = document.createElement('canvas');
            const sCtx = spriteCanvas.getContext('2d');
            const size = 64;
            spriteCanvas.width = size;
            spriteCanvas.height = size;

            const gradient = sCtx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
            gradient.addColorStop(0, 'rgba(255, 255, 255, 1)');
            gradient.addColorStop(0.2, 'rgba(255, 255, 255, 0.8)');
            gradient.addColorStop(0.5, 'rgba(255, 255, 255, 0.2)');
            gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');

            sCtx.fillStyle = gradient;
            sCtx.fillRect(0, 0, size, size);
        }

        function init() {
            const dpr = window.devicePixelRatio || 1;
            canvas.width = window.innerWidth * dpr;
            canvas.height = window.innerHeight * dpr;
            ctx.scale(dpr, dpr);
            
            // High Density: 800+ particles without lag
            const count = Math.min((window.innerWidth * window.innerHeight) / 1000, 1000);
            particles = Array.from({ length: count }, () => new Particle());
            createParticleSprite();
        }

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * window.innerWidth;
                this.y = Math.random() * window.innerHeight;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.size = Math.random() * 15 + 5;
                // Vibrance: Each particle gets a unique offset in the color wheel
                this.hueOffset = Math.random() * 120; 
            }
            update() {
                const dx = mouse.x - this.x;
                const dy = mouse.y - this.y;
                const dist = Math.sqrt(dx*dx + dy*dy);

                if (dist < 200 && mouse.active) {
                    const force = (200 - dist) / 200;
                    this.vx -= (dx / dist) * force * 0.5;
                    this.vy -= (dy / dist) * force * 0.5;
                }

                this.x += this.vx;
                this.y += this.vy;
                this.vx *= 0.99;
                this.vy *= 0.99;

                // Bounce with energy loss
                if (this.x < 0 || this.x > window.innerWidth) this.vx *= -1;
                if (this.y < 0 || this.y > window.innerHeight) this.vy *= -1;
            }
            draw() {
                const currentHue = (hueCircle + this.hueOffset) % 360;
                ctx.globalAlpha = 0.6;
                // Tint the pre-rendered sprite using 'source-atop' logic (simplified here)
                ctx.filter = `hue-rotate(${currentHue}deg) saturate(200%)`;
                ctx.drawImage(spriteCanvas, this.x - this.size/2, this.y - this.size/2, this.size, this.size);
                ctx.filter = 'none';
            }
        }

        function animate() {
            // Darker background for more "pop"
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);
            
            ctx.globalCompositeOperation = 'screen'; // Makes colors blend vibrantly
            hueCircle += 0.5; // Slowly shift the whole universe's color

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', init);
        window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; mouse.active = true; });
        init();
        animate();
    </script>
</body>
</html>
