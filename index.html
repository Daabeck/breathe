<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethereal Flow</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #030305; }
        canvas { display: block; filter: blur(0.5px); } /* Subtle softening */
        #instruction {
            position: absolute; bottom: 40px; width: 100%; text-align: center;
            color: rgba(255, 255, 255, 0.2); font-family: sans-serif;
            letter-spacing: 4px; font-size: 10px; text-transform: uppercase;
            pointer-events: none; animation: pulse 4s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>
    <div id="instruction">Trace the void • Click to disrupt</div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const mouse = { x: -1000, y: -1000, active: false };

        function initCanvas() {
            // HIGH-DPI FIX: Matches canvas internal pixels to physical screen pixels
            const dpr = window.devicePixelRatio || 1;
            canvas.width = window.innerWidth * dpr;
            canvas.height = window.innerHeight * dpr;
            canvas.style.width = `${window.innerWidth}px`;
            canvas.style.height = `${window.innerHeight}px`;
            ctx.scale(dpr, dpr);
            
            // Scalable density: More particles for bigger screens
            const area = window.innerWidth * window.innerHeight;
            const count = Math.floor(area / 6000); 
            particles = Array.from({ length: count }, () => new Particle());
        }

        window.addEventListener('resize', initCanvas);
        window.addEventListener('mousemove', (e) => { 
            mouse.x = e.clientX; mouse.y = e.clientY; mouse.active = true; 
        });
        window.addEventListener('mousedown', () => particles.forEach(p => p.repel()));

        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * window.innerWidth;
                this.y = Math.random() * window.innerHeight;
                this.vx = (Math.random() - 0.5) * 0.2;
                this.vy = (Math.random() - 0.5) * 0.2;
                this.size = Math.random() * 1.5 + 0.5;
                this.hue = 200 + Math.random() * 60;
            }
            repel() {
                const dx = this.x - mouse.x;
                const dy = this.y - mouse.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < 400) {
                    this.vx += (dx / dist) * 15;
                    this.vy += (dy / dist) * 15;
                }
            }
            update() {
                if (mouse.active) {
                    const dx = mouse.x - this.x;
                    const dy = mouse.y - this.y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < 250) {
                        this.vx += dx * 0.00015;
                        this.vy += dy * 0.00015;
                    }
                }
                this.x += this.vx; this.y += this.vy;
                this.vx *= 0.96; this.vy *= 0.96; // Friction

                if (this.x < 0 || this.x > window.innerWidth) this.vx *= -1;
                if (this.y < 0 || this.y > window.innerHeight) this.vy *= -1;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 80%, 70%, 0.8)`;
                ctx.fill();
            }
        }

        function animate() {
            // Trail Effect: Don't clear fully, leave a ghost
            ctx.fillStyle = 'rgba(3, 3, 5, 0.1)';
            ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);
            
            // Visual Juice: Additive blending makes clusters look like bright stars
            ctx.globalCompositeOperation = 'lighter';
            particles.forEach(p => { p.update(); p.draw(); });
            ctx.globalCompositeOperation = 'source-over';
            
            requestAnimationFrame(animate);
        }

        initCanvas();
        animate();
    </script>
</body>
</html>
